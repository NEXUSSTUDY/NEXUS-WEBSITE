<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NEXUS STUDY | Elite Learning Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --white: #ffffff;
      --apple-gray: #f5f5f7;
      --text: #1d1d1f;
      --accent: #0071e3;
      --border: rgba(0,0,0,0.08);
      --shadow-deep: 0 40px 100px rgba(0, 0, 0, 0.15);
      --glass: rgba(255, 255, 255, 0.75);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    body { background: var(--white); color: var(--text); overflow-x: hidden; }

    header { height: 72px; background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(60px); display: flex; align-items: center; padding: 0 5%; position: fixed; width: 100%; top: 0; z-index: 10000; border-bottom: 1px solid var(--border); }
    .logo { flex: 1; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .logo h1 { font-family: 'Outfit'; font-size: 26px; font-weight: 900; letter-spacing: -2px; }
    .logo-mark { width: 42px; height: 42px; background: linear-gradient(135deg, #0071e3, #0051b3); border-radius: 12px; position: relative; }
    .logo-mark::after { content: 'N'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: 'Outfit'; font-weight: 900; font-size: 22px; }

    .view-section { display: none; padding: 140px 6%; min-height: 100vh; }
    .active-view { display: block; }

    /* HERO */
    .hero-container { text-align: center; padding: 120px 70px; border-radius: 60px; background: var(--apple-gray); position: relative; overflow: hidden; box-shadow: var(--shadow-deep); border: 1px solid var(--border); }
    .hero-h2 { font-family: 'Outfit'; font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; margin-bottom: 20px; }
    .hero-h2 span { color: var(--accent); }
    .btn-3d { padding: 22px 50px; border-radius: 999px; background: #0071e3; color: #fff; font-weight: 800; border: none; cursor: pointer; font-size: 1.1rem; }

    /* PREMIUM MODAL (40/60) */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); z-index: 50000; display: none; align-items: center; justify-content: center; }
    .enroll-card { width: 90%; max-width: 1100px; height: 650px; background: #fff; border-radius: 40px; display: flex; overflow: hidden; box-shadow: var(--shadow-deep); transform: scale(0.9); opacity: 0; }
    .enroll-card.active { transform: scale(1); opacity: 1; }

    .enroll-form-part { width: 40%; padding: 50px; display: flex; flex-direction: column; overflow-y: auto; background: #fff; position: relative; }
    .enroll-graphic-part { 
      width: 60%; background: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=1200') no-repeat center; 
      background-size: cover; position: relative; 
    }
    .enroll-graphic-part::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, rgba(0,113,227,0.7), rgba(0,0,0,0.3)); }
    
    .input-group input, .input-group select { 
      width: 100%; padding: 18px 24px; border-radius: 16px; border: 1.5px solid rgba(0,0,0,0.08); 
      margin-bottom: 15px; font-size: 1rem; background: var(--apple-gray); outline: none; 
    }
    .input-group input:focus { border-color: var(--accent); background: #fff; }
    .locked-input { background: #e9ecef !important; cursor: not-allowed; font-weight: 700; color: #666; }

    .btn-submit { width: 100%; padding: 20px; border-radius: 999px; background: #111; color: #fff; font-weight: 800; border: none; cursor: pointer; margin-top: 10px; }
    .close-btn { position: absolute; top: 25px; left: 25px; cursor: pointer; font-weight: 700; opacity: 0.5; z-index: 10; }

    @media (max-width: 900px) { .enroll-card { flex-direction: column; height: 90vh; } .enroll-form-part, .enroll-graphic-part { width: 100%; } .enroll-graphic-part { height: 150px; order: -1; } }
  </style>
</head>
<body>

  <div class="modal-overlay" id="enrollModal">
    <div class="enroll-card" id="enrollCard">
      <div class="close-btn" onclick="closeEnroll()"><i class="fas fa-times"></i> Close</div>
      
      <div class="enroll-form-part">
        <div id="step-1">
          <h2 style="font-family:'Outfit'; font-weight:900; font-size:2rem; margin: 40px 0 10px;">Elite Login</h2>
          <p style="opacity:0.6; margin-bottom:30px;">Apna phone number darj karein.</p>
          <div class="input-group">
            <input type="tel" id="mainPhone" placeholder="Phone Number (10 digits)" maxlength="10">
          </div>
          <button class="btn-submit" onclick="showOTP()">Send OTP</button>
        </div>

        <div id="step-2" style="display:none;">
          <h2 style="font-family:'Outfit'; font-weight:900; font-size:2rem; margin: 40px 0 10px;">Verify OTP</h2>
          <p style="opacity:0.6; margin-bottom:30px;">4-digit code enter karein.</p>
          <div class="input-group" style="display:flex; gap:10px;">
            <input type="text" maxlength="1" style="text-align:center;">
            <input type="text" maxlength="1" style="text-align:center;">
            <input type="text" maxlength="1" style="text-align:center;">
            <input type="text" maxlength="1" style="text-align:center;">
          </div>
          <button class="btn-submit" onclick="showSignup()">Verify & Continue</button>
        </div>

        <div id="step-3" style="display:none;">
          <h2 style="font-family:'Outfit'; font-weight:900; font-size:1.8rem; margin: 20px 0 5px;">Sign Up</h2>
          <p style="opacity:0.6; margin-bottom:20px; font-size:0.9rem;">Elite batch join karne ke liye details bharein.</p>
          <div class="input-group">
            <label style="font-size:11px; font-weight:800; margin-left:10px; opacity:0.5;">REGISTERED NUMBER</label>
            <input type="text" id="lockedPhoneField" class="locked-input" readonly>
            
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email Address">
            
            <select>
              <option value="">Class / Target Exam</option>
              <option>Class 11 (JEE/NEET)</option>
              <option>Class 12 (JEE/NEET)</option>
              <option>Dropper Elite</option>
              <option>Foundation (9th-10th)</option>
            </select>

            <input type="text" placeholder="Education Board (e.g. CBSE)">
            
            <select>
              <option value="">Preferred Language</option>
              <option>English</option>
              <option>Hindi</option>
              <option>Hinglish</option>
            </select>
          </div>
          <button class="btn-submit" onclick="finish()">Complete Enrollment</button>
        </div>
      </div>

      <div class="enroll-graphic-part">
        <div style="position:absolute; bottom:40px; left:40px; color:#fff; z-index:5;">
          <h4 style="font-family:'Outfit'; font-size:2rem; font-weight:900;">NEXUS ELITE</h4>
          <p style="opacity:0.8;">Fueling the dreams of IITians & Doctors.</p>
        </div>
      </div>
    </div>
  </div>

  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <h1>NEXUS STUDY</h1>
    </div>
  </header>

  <main id="home-v" class="view-section active-view">
    <div class="hero-container">
      <h2 class="hero-h2">The Future of <span>Elite Education.</span></h2>
      <button class="btn-3d" onclick="openEnroll()">Enroll Elite Batch</button>
    </div>
  </main>

  <script>
    function openEnroll() {
      const modal = document.getElementById('enrollModal');
      modal.style.display = 'flex';
      setTimeout(() => document.getElementById('enrollCard').classList.add('active'), 10);
    }

    function closeEnroll() {
      document.getElementById('enrollCard').classList.remove('active');
      setTimeout(() => {
        document.getElementById('enrollModal').style.display = 'none';
        resetSteps();
      }, 400);
    }

    function showOTP() {
      const phone = document.getElementById('mainPhone').value;
      if(phone.length < 10) return alert("Valid phone number enter karein.");
      document.getElementById('step-1').style.display = 'none';
      document.getElementById('step-2').style.display = 'block';
      document.getElementById('lockedPhoneField').value = "+91 " + phone;
    }

    function showSignup() {
      document.getElementById('step-2').style.display = 'none';
      document.getElementById('step-3').style.display = 'block';
    }

    function resetSteps() {
      document.getElementById('step-1').style.display = 'block';
      document.getElementById('step-2').style.display = 'none';
      document.getElementById('step-3').style.display = 'none';
    }

    function finish() {
      alert("Congratulations! Aapka enrollment safal raha.");
      closeEnroll();
    }
  </script>
</body>
</html>
