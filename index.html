<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS STUDY</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:sans-serif;margin:0}

/* simple UI */
.page{display:none;padding:40px;text-align:center}
.active{display:block}

input{padding:15px;margin:10px;width:250px}
button{padding:15px 30px;background:#0071e3;color:#fff;border:none}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>Welcome to Nexus Dashboard</h2>
  <p id="userEmail"></p>

  <button onclick="payNow()">Buy Course ₹999</button><br><br>
  <button onclick="logout()">Logout</button>
</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* REGISTER */
function register(){
  auth.createUserWithEmailAndPassword(
    email.value,
    pass.value
  ).then(()=>alert("Registered"));
}

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    pass.value
  );
}

/* STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    loginPage.style.display="none";
    dashboard.style.display="block";
    userEmail.innerText=user.email;
  }
});

/* LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}

/* PAYMENT */
function payNow(){
  var options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: 99900,
    currency: "INR",
    name: "Nexus Study",
    description: "Elite Course",
    handler: function (response){
      alert("Payment Success");
    }
  };
  var rzp = new Razorpay(options);
  rzp.open();
}

</script>

</body>
</html>
