<!-- SAME CODE, ONLY NECESSARY UPGRADES ADDED -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS STUDY | Elite Learning Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

<style>

:root {
  --white:#fff;
  --text:#1d1d1f;
  --accent:#0071e3;
  --glass: rgba(255,255,255,0.6);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Plus Jakarta Sans',sans-serif;
}

body{
  background:#fff;
  overflow-x:hidden;
}

/* ===== CURSOR GLOW ===== */
.cursor{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,113,227,0.25), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* ===== HEADER GLASS ===== */
header{
  height:85px;
  backdrop-filter:blur(25px);
  background:var(--glass);
  display:flex;
  align-items:center;
  padding:0 6%;
  position:fixed;
  width:100%;
  z-index:1000;
}

/* ===== HERO UPGRADE ===== */
.hero-container{
  text-align:center;
  max-width:1000px;
  margin:120px auto;
  padding:120px 50px;
  border-radius:40px;
  position:relative;
  overflow:hidden;
}

.hero-bg-image{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  background:
    linear-gradient(120deg, rgba(0,113,227,0.25), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1531545514256-b1400bc00f31?auto=format&fit=crop&q=80&w=1600');
  background-size:cover;
  z-index:-1;
  animation:zoom 18s infinite alternate;
}

@keyframes zoom{
  0%{transform:scale(1);}
  100%{transform:scale(1.1);}
}

.hero-h2{
  font-family:'Outfit';
  font-size:4rem;
  font-weight:900;
}
.hero-h2 span{color:var(--accent);}

.hero-p{
  margin-top:20px;
  opacity:0.7;
  font-size:1.1rem;
}

/* ===== 3D CARDS ===== */
.feature-card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  padding:50px;
  border-radius:30px;
  margin:40px auto;
  max-width:900px;
  transform-style:preserve-3d;
  transition:0.4s;
}
.feature-card:hover{
  transform:rotateX(6deg) rotateY(6deg) scale(1.02);
}

/* ===== MAGNETIC BUTTON ===== */
.btn-submit{
  padding:18px 40px;
  border-radius:50px;
  background:var(--accent);
  color:#fff;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

/* ===== SCROLL REVEAL ===== */
.reveal{
  opacity:0;
  transform:translateY(80px);
  transition:1s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<header>
  <h1>NEXUS STUDY</h1>
</header>

<main>

<div class="hero-container reveal active">
  <div class="hero-bg-image"></div>

  <h2 class="hero-h2">
    India's Most <br>
    <span>Elite Rankers Ecosystem</span>
  </h2>

  <p class="hero-p">
    Nexus Study is a high-performance academic system engineered for IIT & AIIMS ranks through precision learning and elite mentorship.
  </p>

  <button class="btn-submit" id="magneticBtn">Enter Elite Program</button>
</div>

<div class="feature-card reveal">Expert Faculty</div>
<div class="feature-card reveal">Premium Notes</div>
<div class="feature-card reveal">Classroom Friendly</div>

</main>

<script>

/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.top = e.clientY+"px";
  cursor.style.left = e.clientX+"px";
});

/* MAGNETIC BUTTON */
const btn = document.getElementById("magneticBtn");

btn.addEventListener("mousemove", e=>{
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width/2;
  const y = e.clientY - rect.top - rect.height/2;
  btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px)`;
});

btn.addEventListener("mouseleave", ()=>{
  btn.style.transform="translate(0,0)";
});

/* SCROLL */
window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".reveal").forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add("active");
    }
  });
});

</script>

</body>
</html>
